apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-health-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-health-service
  template:
    metadata:
      labels:
        app: k8s-health-service
    spec:
      containers:
        - name: app
          image: your-registry/k8s-health-service:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-health-service
spec:
  selector:
    app: k8s-health-service
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: k8s-health-service-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: k8s-health-service
