replicaCount: 3

image:
  repository: your-registry/k8s-health-service
  tag: stable
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  APP_NAME: k8s-health-service
  APP_VERSION: "1.0.0"
  CHECK_TIMEOUT_SECONDS: "2.0"
  HTTP_CHECKS: ""
  TCP_CHECKS: ""
  POSTGRES_DSN: ""
  REDIS_URL: ""

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  cpuAverageUtilization: 70
  memoryAverageUtilization: 75

podDisruptionBudget:
  minAvailable: 2

serviceMonitor:
  enabled: true
  interval: 15s
  labels:
    release: prometheus

prometheusRule:
  enabled: true
  labels:
    release: prometheus
