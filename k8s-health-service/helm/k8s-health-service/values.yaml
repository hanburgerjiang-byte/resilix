replicaCount: 2

image:
  repository: your-registry/k8s-health-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  APP_NAME: k8s-health-service
  APP_VERSION: "1.0.0"
  CHECK_TIMEOUT_SECONDS: "2.0"
  HTTP_CHECKS: ""
  TCP_CHECKS: ""

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuAverageUtilization: 70
  memoryAverageUtilization: 75

podDisruptionBudget:
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 15s
  labels:
    release: prometheus
