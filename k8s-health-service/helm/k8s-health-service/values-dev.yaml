replicaCount: 1

image:
  repository: your-registry/k8s-health-service
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  APP_NAME: k8s-health-service
  APP_VERSION: "1.0.0-dev"
  CHECK_TIMEOUT_SECONDS: "2.0"
  HTTP_CHECKS: ""
  TCP_CHECKS: ""
  POSTGRES_DSN: ""
  REDIS_URL: ""

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  cpuAverageUtilization: 70
  memoryAverageUtilization: 75

podDisruptionBudget:
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s
  labels:
    release: prometheus

prometheusRule:
  enabled: false
  labels:
    release: prometheus
